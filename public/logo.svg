<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <defs>
    <linearGradient id="audioflixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="256" height="256" fill="#0f0f23"/>
  
  <!-- Circular background for logo -->
  <circle cx="128" cy="128" r="110" fill="url(#audioflixGradient)" opacity="0.15" stroke="url(#audioflixGradient)" stroke-width="2"/>
  
  <!-- Soundwave visualization (stylized) -->
  <g transform="translate(128, 128)">
    <!-- Left wave -->
    <path d="M -30 -40 Q -30 0 -30 40" stroke="url(#audioflixGradient)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center-left wave -->
    <path d="M -15 -55 Q -15 0 -15 55" stroke="url(#audioflixGradient)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <!-- Center wave -->
    <path d="M 0 -60 Q 0 0 0 60" stroke="url(#audioflixGradient)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center-right wave -->
    <path d="M 15 -55 Q 15 0 15 55" stroke="url(#audioflixGradient)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <!-- Right wave -->
    <path d="M 30 -40 Q 30 0 30 40" stroke="url(#audioflixGradient)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Play triangle overlay (subtle) -->
  <path d="M 110 100 L 146 128 L 110 156 Z" fill="url(#audioflixGradient)" opacity="0.6"/>
</svg>
